<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>توقعات كأس العالم 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">

<!-- Firebase (compat, no build step needed) -->
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore-compat.js"></script>
<!-- Auth handled via Firestore accounts collection -->

<style>
  :root{
    --bg:#0B1A14;
    --bg-deep:#06120D;
    --surface:#122821;
    --surface-2:#17332A;
    --line:#26473C;
    --gold:#D9A53C;
    --gold-soft:#8C7232;
    --mint:#46B59B;
    --mint-dim:#2D6E5D;
    --cream:#F3EFE3;
    --muted:#8FA89F;
    --danger:#C0523F;
    --radius:14px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(circle at 15% 0%, rgba(70,181,155,0.08), transparent 40%),
      radial-gradient(circle at 85% 10%, rgba(217,165,60,0.06), transparent 35%),
      var(--bg);
    color:var(--cream);
    font-family:'Tajawal','Inter',sans-serif;
    min-height:100vh;
    padding-bottom:60px;
  }
  .scoreboard-font{font-family:'Oswald','Tajawal',sans-serif;}

  /* Pitch-line texture header */
  header.top{
    position:relative;
    padding:28px 20px 22px;
    background:linear-gradient(180deg, var(--bg-deep), var(--bg));
    border-bottom:1px solid var(--line);
    overflow:hidden;
  }
  header.top::before{
    content:"";
    position:absolute; inset:0;
    background-image: repeating-linear-gradient(90deg, rgba(255,255,255,0.025) 0 1px, transparent 1px 90px);
    pointer-events:none;
  }
  .top-inner{max-width:980px;margin:0 auto;position:relative;z-index:1;}
  .eyebrow{
    color:var(--gold);
    font-size:12px;
    letter-spacing:3px;
    font-weight:700;
    text-transform:uppercase;
    font-family:'Oswald',sans-serif;
  }
  h1.title{
    font-family:'Oswald',sans-serif;
    font-size:clamp(28px,5vw,42px);
    margin:6px 0 2px;
    color:var(--cream);
    letter-spacing:0.5px;
  }
  .title .accent{color:var(--mint);}
  p.sub{color:var(--muted);margin:0 0 18px;font-size:14.5px;}

  .id-row{
    display:flex;flex-wrap:wrap;gap:10px;align-items:center;
  }
  .id-row input[type=text]{
    background:var(--surface);
    border:1px solid var(--line);
    color:var(--cream);
    padding:11px 14px;
    border-radius:10px;
    font-size:14px;
    font-family:'Tajawal',sans-serif;
    min-width:180px;
    flex:1;
  }
  .id-row input[type=text]:focus{outline:2px solid var(--mint);}
  .btn{
    background:var(--mint-dim);
    color:var(--cream);
    border:1px solid var(--mint);
    padding:11px 18px;
    border-radius:10px;
    font-weight:700;
    cursor:pointer;
    font-family:'Tajawal',sans-serif;
    font-size:14px;
    transition:transform .12s ease, background .2s ease;
  }
  .btn:hover{background:var(--mint);}
  .btn:active{transform:scale(0.97);}
  .btn.ghost{background:transparent;border:1px solid var(--line);color:var(--muted);}
  .btn.ghost:hover{border-color:var(--gold);color:var(--gold);}
  .btn.gold{background:transparent;border:1px solid var(--gold-soft);color:var(--gold);}
  .btn.gold:hover{background:var(--gold);color:var(--bg-deep);}
  .btn.small{padding:7px 12px;font-size:12.5px;}

  .status-pill{
    font-size:12px;color:var(--muted);
    border:1px solid var(--line);
    padding:6px 12px;border-radius:20px;
    font-family:'Oswald',sans-serif;letter-spacing:0.5px;
  }
  .status-pill.live{border-color:var(--mint);color:var(--mint);}

  .auth-box{
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:16px;
    max-width:420px;
  }
  .auth-tabs{display:flex;gap:6px;margin-bottom:12px;}
  .auth-tab{
    flex:1;text-align:center;padding:8px 10px;border-radius:8px;
    border:1px solid var(--line);background:transparent;color:var(--muted);
    cursor:pointer;font-family:'Oswald',sans-serif;font-size:13px;letter-spacing:0.5px;
  }
  .auth-tab.active{background:var(--mint-dim);border-color:var(--mint);color:var(--cream);font-weight:600;}
  .auth-form{display:flex;flex-direction:column;gap:8px;}
  .auth-form input{
    background:var(--bg-deep);
    border:1px solid var(--line);
    color:var(--cream);
    padding:11px 14px;
    border-radius:10px;
    font-size:14px;
    font-family:'Tajawal',sans-serif;
  }
  .auth-form input:focus{outline:2px solid var(--mint);}
  .auth-error{color:var(--danger);font-size:12.5px;margin-top:8px;min-height:14px;}
  .user-box{
    display:flex;flex-wrap:wrap;gap:10px;align-items:center;
  }
  .user-box .welcome{
    font-family:'Oswald',sans-serif;color:var(--cream);font-size:14px;
  }
  .user-box .welcome b{color:var(--gold);}

  nav.tabs{
    max-width:980px;margin:18px auto 0;
    display:flex;gap:8px;overflow-x:auto;
    padding:4px 20px 12px;
    scrollbar-width:none;
  }
  nav.tabs::-webkit-scrollbar{display:none;}
  .tab{
    flex:0 0 auto;
    padding:9px 16px;
    border-radius:30px;
    border:1px solid var(--line);
    color:var(--muted);
    font-family:'Oswald',sans-serif;
    font-size:13px;
    letter-spacing:0.5px;
    cursor:pointer;
    white-space:nowrap;
    background:var(--surface);
  }
  .tab.active{
    background:var(--gold);
    color:var(--bg-deep);
    border-color:var(--gold);
    font-weight:600;
  }

  main{max-width:980px;margin:0 auto;padding:10px 20px 40px;}

  .round-heading{
    display:flex;align-items:baseline;gap:10px;
    margin:28px 0 14px;
  }
  .round-heading h2{
    font-family:'Oswald',sans-serif;
    font-size:20px;color:var(--gold);
    margin:0;letter-spacing:0.5px;
  }
  .round-heading .count{color:var(--muted);font-size:13px;}
  .round-heading::after{content:"";flex:1;height:1px;background:var(--line);}

  .match-card{
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:16px 18px;
    margin-bottom:12px;
    display:flex;flex-direction:column;gap:12px;
  }
  .match-meta{
    display:flex;justify-content:space-between;align-items:center;
    font-size:12px;color:var(--muted);
    font-family:'Oswald',sans-serif;letter-spacing:0.3px;
  }
  .match-meta .pts{
    font-weight:700;
  }
  .pts.p3{color:var(--gold);}
  .pts.p1{color:var(--mint);}
  .pts.p0{color:var(--danger);}

  .teams-row{
    display:grid;
    grid-template-columns:1fr auto 1fr;
    align-items:center;
    gap:10px;
  }
  .team{
    display:flex;flex-direction:column;gap:6px;align-items:center;
    text-align:center;
  }
  .team-name{
    font-family:'Tajawal',sans-serif;
    font-weight:700;
    font-size:15px;
    color:var(--cream);
    background:transparent;
    border:none;
    text-align:center;
    width:100%;
    border-bottom:1px dashed transparent;
  }
  .team-name[contenteditable="true"]{
    border-bottom:1px dashed var(--gold-soft);
    cursor:text;
  }
  .score-box{
    width:52px;height:52px;
    background:var(--bg-deep);
    border:1px solid var(--line);
    border-radius:8px;
    text-align:center;
    color:var(--gold);
    font-family:'Oswald',sans-serif;
    font-size:26px;
    font-weight:600;
  }
  .score-box:focus{outline:2px solid var(--mint);}
  .vs-block{
    display:flex;flex-direction:column;align-items:center;gap:4px;
  }
  .vs-label{color:var(--muted);font-family:'Oswald',sans-serif;font-size:12px;letter-spacing:2px;}

  .actual-row{
    display:flex;justify-content:center;align-items:center;gap:14px;
    background:var(--bg-deep);
    border:1px solid var(--line);
    border-radius:10px;
    padding:10px;
    font-family:'Oswald',sans-serif;
  }
  .actual-row .lbl{color:var(--muted);font-size:12px;letter-spacing:1px;}
  .actual-row .score{color:var(--mint);font-size:20px;font-weight:700;}
  .actual-row input.admin-score{
    width:42px;height:36px;background:var(--surface-2);border:1px solid var(--gold-soft);
    color:var(--gold);text-align:center;border-radius:6px;font-family:'Oswald',sans-serif;font-size:16px;
  }

  .card-footer{
    display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;
  }
  .saved-tag{font-size:12px;color:var(--mint);font-family:'Oswald',sans-serif;}

  .leaderboard{
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:var(--radius);
    overflow:hidden;
  }
  table{width:100%;border-collapse:collapse;}
  thead th{
    text-align:right;
    font-family:'Oswald',sans-serif;
    font-size:12px;letter-spacing:1px;
    color:var(--muted);
    padding:12px 16px;
    border-bottom:1px solid var(--line);
    background:var(--surface-2);
  }
  tbody td{
    padding:13px 16px;
    border-bottom:1px solid var(--line);
    font-size:14px;
  }
  tbody tr:last-child td{border-bottom:none;}
  .rank{
    font-family:'Oswald',sans-serif;
    font-weight:700;
    color:var(--gold);
    width:36px;
  }
  .rank.gold-1{color:var(--gold);font-size:18px;}
  .rank.silver-2{color:#C9C9C9;}
  .rank.bronze-3{color:#C98B4F;}
  .total-pts{font-family:'Oswald',sans-serif;font-weight:700;color:var(--mint);font-size:16px;}
  .you-row{background:rgba(70,181,155,0.07);}

  .empty{
    text-align:center;color:var(--muted);padding:40px 10px;font-size:14px;
  }

  .admin-bar{
    display:flex;gap:8px;align-items:center;flex-wrap:wrap;
    background:var(--surface-2);
    border:1px solid var(--gold-soft);
    border-radius:10px;
    padding:10px 14px;
    margin-bottom:18px;
    font-size:13px;
  }
  .admin-bar input[type=text]{
    background:var(--bg-deep);border:1px solid var(--line);color:var(--cream);
    padding:7px 10px;border-radius:6px;width:90px;font-family:'Oswald',sans-serif;
  }

  footer.note{
    max-width:980px;margin:30px auto 0;padding:0 20px;
    color:var(--muted);font-size:12.5px;line-height:1.8;
  }
  footer.note code{background:var(--surface);padding:2px 6px;border-radius:4px;color:var(--gold);}

  @media (max-width:540px){
    .score-box{width:42px;height:42px;font-size:20px;}
    .team-name{font-size:13px;}
  }

  ::-webkit-scrollbar{height:8px;width:8px;}
  ::-webkit-scrollbar-thumb{background:var(--line);border-radius:4px;}

  /* ---- Lock overlay on score boxes ---- */
  .score-box:disabled{
    opacity:0.6;
    cursor:not-allowed;
    border-color:var(--line);
    color:var(--muted);
  }
  .lock-badge{
    display:inline-flex;align-items:center;gap:5px;
    font-size:11.5px;color:var(--gold);
    font-family:'Oswald',sans-serif;letter-spacing:0.5px;
  }

  /* ---- Global locked banner ---- */
  .global-lock-banner{
    background: linear-gradient(135deg, rgba(192,82,63,0.15), rgba(192,82,63,0.05));
    border: 1.5px solid var(--danger);
    border-radius: 10px;
    padding: 10px 16px;
    font-family:'Oswald',sans-serif;
    font-size:13px;
    color: var(--danger);
    letter-spacing: 0.5px;
    margin-bottom: 12px;
    text-align: center;
  }

  /* ---- Double section & button ---- */
  .double-section{
    background: linear-gradient(135deg, rgba(217,165,60,0.09) 0%, rgba(6,18,13,0.4) 100%);
    border: 1.5px solid var(--gold-soft);
    border-radius: 10px;
    padding: 10px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    position: relative;
    overflow: hidden;
    margin-top: 2px;
  }
  .double-section::after{
    content:"⚡";
    position:absolute;
    left:8px; top:50%;
    transform:translateY(-50%);
    font-size:52px;
    opacity:0.05;
    pointer-events:none;
    line-height:1;
  }
  .double-section-label{
    font-family:'Oswald',sans-serif;
    font-size:12px;
    color:var(--gold);
    letter-spacing:1px;
    text-transform:uppercase;
    flex:1;
    line-height:1.4;
    position:relative;z-index:1;
  }
  .double-section-label small{
    display:block;
    font-size:10.5px;
    color:var(--muted);
    letter-spacing:0;
    text-transform:none;
    margin-top:2px;
    font-family:'Tajawal',sans-serif;
  }
  .btn.double-btn{
    background: linear-gradient(135deg, rgba(217,165,60,0.18), rgba(217,165,60,0.06));
    border: 1.5px solid var(--gold-soft);
    color: var(--gold);
    font-family:'Oswald',sans-serif;
    font-size:12.5px;
    letter-spacing:0.8px;
    padding: 8px 16px;
    border-radius: 8px;
    cursor: pointer;
    transition: all .2s;
    white-space:nowrap;
    position:relative;z-index:1;
  }
  .btn.double-btn:hover{
    background: var(--gold);
    color: var(--bg-deep);
    border-color: var(--gold);
    box-shadow: 0 0 16px rgba(217,165,60,0.4);
  }
  .btn.double-btn.active-double{
    background: var(--gold);
    color: var(--bg-deep);
    border-color: var(--gold);
    box-shadow: 0 0 18px rgba(217,165,60,0.5);
    font-weight:700;
  }
  .btn.double-btn.used{
    cursor: default;
    opacity: 0.5;
  }
  .btn.double-btn.used:hover{
    background: linear-gradient(135deg, rgba(217,165,60,0.18), rgba(217,165,60,0.06));
    color: var(--gold);
    border-color: var(--gold-soft);
    box-shadow: none;
  }
  /* كارت فيه double مقفول — هايلايت واضح */
  .match-card.double-locked{
    border-color: rgba(217,165,60,0.6);
    background: linear-gradient(160deg, rgba(217,165,60,0.11) 0%, var(--surface) 50%);
    box-shadow: 0 0 0 1.5px rgba(217,165,60,0.2), 0 4px 24px rgba(217,165,60,0.08);
    position: relative;
  }
  .match-card.double-locked::before{
    content: "⚡";
    position: absolute;
    top: 10px;
    left: 14px;
    font-size: 13px;
    opacity: 0.55;
    pointer-events: none;
  }
  .double-locked-badge{
    display:inline-flex;align-items:center;gap:6px;
    background: linear-gradient(135deg, rgba(217,165,60,0.2), rgba(140,114,50,0.1));
    border: 1.5px solid var(--gold);
    border-radius: 8px;
    padding: 6px 12px;
    font-family:'Oswald',sans-serif;
    font-size:12px;
    color: var(--gold);
    letter-spacing:0.5px;
  }

  /* ---- Confirmation Modal ---- */
  .modal-backdrop{
    position:fixed;inset:0;
    background:rgba(6,18,13,0.82);
    backdrop-filter:blur(4px);
    z-index:1000;
    display:flex;align-items:center;justify-content:center;
    padding:20px;
    opacity:0;pointer-events:none;
    transition:opacity .2s;
  }
  .modal-backdrop.open{opacity:1;pointer-events:all;}
  .modal{
    background:var(--surface);
    border:1px solid var(--gold-soft);
    border-radius:16px;
    padding:28px 24px;
    max-width:380px;width:100%;
    text-align:center;
    transform:translateY(8px);
    transition:transform .2s;
    box-shadow:0 20px 60px rgba(0,0,0,0.5);
  }
  .modal-backdrop.open .modal{transform:translateY(0);}
  .modal-icon{font-size:32px;margin-bottom:10px;}
  .modal-title{
    font-family:'Oswald',sans-serif;
    font-size:18px;color:var(--cream);
    margin:0 0 6px;letter-spacing:0.5px;
  }
  .modal-body{
    color:var(--muted);font-size:14px;
    line-height:1.6;margin-bottom:20px;
  }
  .modal-body .highlight{
    color:var(--gold);font-weight:700;
    font-family:'Oswald',sans-serif;font-size:20px;
    display:block;margin:10px 0;
  }
  .modal-body .double-note{
    color:var(--mint);font-size:12.5px;
    border:1px solid var(--mint-dim);
    border-radius:8px;padding:6px 10px;
    margin-top:8px;display:block;
  }
  .modal-actions{display:flex;gap:10px;justify-content:center;}
  .modal-actions .btn{flex:1;padding:12px;}
</style>
</head>
<body>

<header class="top">
  <div class="top-inner">
    <div class="eyebrow">دور الـ32 → النهائي · 2026</div>
    <h1 class="title">توقعات <span class="accent">المونديال</span></h1>
    <p class="sub">اختار يوزر نيم وباسورد وابدأ التوقع. 3 نقاط للنتيجة المضبوطة، نقطة واحدة لو خمّنت الفائز بس.</p>

    <!-- يظهر للزائر اللي لسه مسجلش دخول -->
    <div class="auth-box" id="authBox">
      <div class="auth-tabs">
        <button class="auth-tab active" id="tabLogin" type="button">تسجيل دخول</button>
        <button class="auth-tab" id="tabSignup" type="button">حساب جديد</button>
      </div>
      <div class="auth-form">
        <input type="text" id="signupNameInput" placeholder="اسمك (يظهر في الترتيب)" style="display:none" />
        <input type="text" id="authEmailInput" placeholder="اليوزر نيم" autocomplete="username" />
        <input type="password" id="authPasswordInput" placeholder="الباسورد (أرقام)" autocomplete="current-password" />
        <button class="btn" id="authSubmitBtn">دخول</button>
      </div>
      <div class="auth-error" id="authError"></div>
    </div>

    <!-- يظهر لما المستخدم يكون عامل لوجين -->
    <div class="user-box" id="userBox" style="display:none">
      <span class="welcome" id="welcomeUser"></span>
      <span class="status-pill" id="connStatus">جاري الاتصال…</span>
      <button class="btn ghost small" id="logoutBtn">تسجيل خروج</button>
      <button class="btn ghost small" id="adminBtn">دخول كأدمن</button>
    </div>
  </div>
</header>

<nav class="tabs" id="tabsNav"></nav>

<main id="mainArea"></main>

<!-- Confirmation Modal -->
<div class="modal-backdrop" id="confirmModal">
  <div class="modal">
    <div class="modal-icon">🔒</div>
    <h3 class="modal-title">تأكيد التوقع</h3>
    <div class="modal-body" id="confirmModalBody"></div>
    <div class="modal-actions">
      <button class="btn ghost" id="confirmCancel">إلغاء</button>
      <button class="btn" id="confirmOk">تأكيد وقفل</button>
    </div>
  </div>
</div>


<script>
/* ============================================================
   1) FIREBASE CONFIG — غيّر القيم دي ببيانات مشروعك من Firebase Console
   ============================================================ */
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyCa7ZRPUzx4oEz4kLjvVZsS3BoFxrQgUfk",
  authDomain: "wc-2026-9de97.firebaseapp.com",
  projectId: "wc-2026-9de97",
  storageBucket: "wc-2026-9de97.firebasestorage.app",
  messagingSenderId: "853444520815",

/* PIN الأدمن اللي يسمح بتعديل أسماء الفرق وتسجيل النتيجة الحقيقية.
   غيّره لأي حاجة تحبها قبل ما تنشر اللعبة. */
const ADMIN_PIN = "2026";

/* ============================================================
   2) بيانات المباريات الأساسية (دور الـ32 لحد النهائي)
   لسه مش كل الفرق متأكدة 100% لحد الآن، فحطيت "TBD" في الأماكن
   اللي لسه مش معروفة، وتقدر تعدلها من واجهة اللعبة (admin mode)
   ============================================================ */
const SEED_MATCHES = [
  // ---- دور الـ32 (16 مباراة) ----
  {id:"r32_1", round:"دور الـ32", order:1, teamA:"جنوب أفريقيا", teamB:"كندا", info:"28 يونيو"},
  {id:"r32_2", round:"دور الـ32", order:2, teamA:"البرازيل", teamB:"اليابان", info:"29 يونيو"},

const auth = null; // مش بنستخدم Firebase Auth

function setAuthMode(mode){
  authMode = mode;
  tabLogin.classList.toggle("active", mode==="login");
  tabSignup.classList.toggle("active", mode==="signup");
  signupNameInput.style.display = mode==="signup" ? "block" : "none";
  authSubmitBtn.textContent = mode==="signup" ? "إنشاء الحساب" : "دخول";
  authError.textContent = "";
}
tabLogin.onclick = ()=> setAuthMode("login");

authSubmitBtn.onclick = async ()=>{
  if(!db){ alert("Firebase غير متصل."); return; }
  const username = authEmailInput.value.trim().toLowerCase();
  const password = authPasswordInput.value.trim();
  authError.textContent = "";

  if(!username || !password){
    authError.textContent = "اكتب اليوزر نيم والباسورد.";
    return;
  }
  if(!/^\d+$/.test(password)){
    authError.textContent = "الباسورد لازم يكون أرقام بس.";
    return;
  }

  authSubmitBtn.disabled = true;

  try{
    if(authMode === "signup"){
      const displayName = signupNameInput.value.trim();
      if(!displayName){
        authError.textContent = "اكتب اسمك الأول.";
        authSubmitBtn.disabled = false;
        return;
      }
      // تأكد إن اليوزر نيم مش موجود
      const existing = await db.collection("accounts").doc(username).get();
      if(existing.exists){
        authError.textContent = "اليوزر نيم ده موجود قبل كده، جرّب تاني.";
        authSubmitBtn.disabled = false;
        return;
      }
      // إنشاء الحساب
      await db.collection("accounts").doc(username).set({
        username, password, displayName, createdAt: Date.now()
      });
      await db.collection("users").doc(username).set({
        name: displayName, username, createdAt: Date.now()
      });
      onLoggedIn(username, displayName);
    } else {
      // تسجيل دخول
      const doc = await db.collection("accounts").doc(username).get();
      if(!doc.exists){
        authError.textContent = "اليوزر نيم ده مش موجود، جرّب تعمل حساب جديد.";
        authSubmitBtn.disabled = false;
        return;
      }
      const data = doc.data();
      if(data.password !== password){
        authError.textContent = "الباسورد غلط.";
        authSubmitBtn.disabled = false;
        return;
      }
      onLoggedIn(username, data.displayName);
    }
  } catch(err){
    console.error(err);
    authError.textContent = "حصل خطأ، حاول تاني.";
  }
  authSubmitBtn.disabled = false;
};

logoutBtn.onclick = ()=>{

function calcPoints(predA, predB, actA, actB){
  if(actA===null || actA===undefined || actB===null || actB===undefined) return null;
  if(predA===null || predA===undefined || predB===null || predB===undefined) return null;
  if(predA===actA && predB===actB) return 3;
  const predSign = Math.sign(predA-predB);
  const actSign = Math.sign(actA-actB);
  if(predSign===actSign) return 1;
  return 0;
}

function buildMatchCard(m){
  const card = document.createElement("div");
  card.className = "match-card";

  const pred = myPredictions[m.id] || {scoreA:"", scoreB:"", locked:false, isDouble:false};
  const isLocked = !!pred.locked;
  const isDouble = !!pred.isDouble;
  const hasResult = m.resultA!==undefined && m.resultA!==null && m.resultB!==undefined && m.resultB!==null;

  // نقاط مع مضاعفة لو double
  let pts = hasResult ? calcPoints(
    pred.scoreA===""? null: Number(pred.scoreA),
    pred.scoreB===""? null: Number(pred.scoreB),
    m.resultA, m.resultB
  ) : null;
  const displayPts = (pts !== null && isDouble) ? pts * 2 : pts;

  const metaRight = hasResult
    ? (displayPts===null ? `<span class="pts">لسه ماتوقعتش</span>`
       : displayPts===6 ? `<span class="pts p3">+6 ⚡🎯 Double مضبوط!</span>`
       : displayPts===3 ? (isDouble ? `<span class="pts p3">+3 ⚡✅ Double فائز</span>` : `<span class="pts p3">+3 🎯 نتيجة مضبوطة</span>`)
       : displayPts===2 ? `<span class="pts p1">+2 ⚡✅ Double فائز</span>`
       : displayPts===1 ? `<span class="pts p1">+1 ✅ فائز صحيح</span>`
       : `<span class="pts p0">0 ❌</span>`)
    : `<span>مفتوحة للتوقع</span>`;

  // double button للراوند ده
  const round = m.round;
  const doubleUsedInRound = doubleUsed[round];
  const doubleLockedHere = doubleUsedInRound === m.id + "__locked";
  const doubleLockedElsewhere = doubleUsedInRound && !doubleLockedHere;
  const effectiveLocked = isLocked || globalLocked;

  // بناء سكشن الـ Double
  let doubleSectionHtml = "";
  if(!hasResult){
    if(isDouble || doubleLockedHere){
      // مقفول بـ double على المباراة دي
      doubleSectionHtml = `
        <div class="double-section">
          <div class="double-section-label">⚡ DOUBLE<small>النقاط مضاعفة على المباراة دي</small></div>
          <span class="double-locked-badge">🔒 مقفول</span>
        </div>`;
    } else if(!effectiveLocked){
      // مفتوح — ممكن يختار double
      doubleSectionHtml = `
        <div class="double-section">
          <div class="double-section-label">⚡ DOUBLE<small>${doubleLockedElsewhere ? 'اتستخدم في مباراة تانية في الراوند ده' : 'ضاعف نقاطك لو توقعك صح'}</small></div>
          <button class="btn double-btn ${doubleLockedElsewhere?'used':''}" ${doubleLockedElsewhere?'disabled':''} data-double="${m.id}">
            ${doubleLockedElsewhere ? '⚡ مستخدم' : '⚡ اختار'}
          </button>
        </div>`;
    }
  }

  if(isDouble || doubleLockedHere) card.classList.add("double-locked");

  const lockBadge = isLocked ? `<span class="lock-badge">🔒 مقفول</span>` : "";

  card.innerHTML = `
    <div class="match-meta">
      <span>${m.round} · مباراة ${m.order}${m.info? " · "+m.info: ""}</span>
      ${metaRight}
    </div>
    <div class="teams-row">
      <div class="team">
        <span class="team-name" ${isAdmin?'contenteditable="true"':''} data-side="A" data-id="${m.id}">${m.teamA}</span>
        <input type="number" min="0" max="30" class="score-box" data-id="${m.id}" data-side="A" value="${pred.scoreA}" placeholder="-" ${effectiveLocked?'disabled':''} />
      </div>
      <div class="vs-block">
        <span class="vs-label scoreboard-font">VS</span>
      </div>
      <div class="team">
        <span class="team-name" ${isAdmin?'contenteditable="true"':''} data-side="B" data-id="${m.id}">${m.teamB}</span>
        <input type="number" min="0" max="30" class="score-box" data-id="${m.id}" data-side="B" value="${pred.scoreB}" placeholder="-" ${effectiveLocked?'disabled':''} />
      </div>
    </div>
    ${doubleSectionHtml}
    ${isAdmin ? `
      <div class="actual-row">
        <span class="lbl scoreboard-font">النتيجة الحقيقية</span>
        <input type="number" min="0" max="30" class="admin-score" data-result-id="${m.id}" data-side="A" value="${hasResult? m.resultA: ''}" />
        <span class="lbl">-</span>
        <input type="number" min="0" max="30" class="admin-score" data-result-id="${m.id}" data-side="B" value="${hasResult? m.resultB: ''}" />
        <button class="btn gold small" data-save-result="${m.id}">حفظ النتيجة</button>
      </div>
    ` : hasResult ? `
      <div class="actual-row">
        <span class="lbl scoreboard-font">النتيجة الحقيقية</span>
        <span class="score">${m.resultA} - ${m.resultB}</span>
      </div>
    ` : ``}
    <div class="card-footer">
      ${!effectiveLocked && !hasResult ? `<button class="btn small" data-save-pred="${m.id}">حفظ وقفل توقعي 🔒</button>` : lockBadge}
      <span class="saved-tag" id="saved_${m.id}"></span>
    </div>
  `;

  // مستمعين
  card.querySelectorAll('[data-save-pred]').forEach(btn=>{
    btn.onclick = ()=> savePrediction(m.id);
  });

  // زرار Double — بيفتح confirm modal
  const dblBtn = card.querySelector('[data-double]');
  if(dblBtn){
    dblBtn.onclick = ()=> confirmDouble(m.id, round, m);
  }

  if(isAdmin){
    card.querySelectorAll('[data-save-result]').forEach(btn=>{
      btn.onclick = ()=> saveResult(m.id);
    });
    card.querySelectorAll('.team-name[contenteditable="true"]').forEach(el=>{
      el.onblur = ()=> saveTeamName(m.id, el.dataset.side, el.textContent.trim());
    });
  }

  return card;
}

  confirmModal.classList.remove("open");
  confirmOk.textContent = "تأكيد وقفل";
  confirmOk.style.display = "";
  confirmCancel.textContent = "إلغاء";
  if(mode === "double"){
    const matchId = confirmModal.dataset.matchId;
    const round = confirmModal.dataset.round;
    // يتقفل نهائي — مش pending تاني
    doubleUsed[round] = matchId + "__locked";
    delete confirmModal.dataset.mode;
    renderMain();
  } else {
    if(pendingConfirm) doSavePrediction(pendingConfirm);
    pendingConfirm = null;
    delete confirmModal.dataset.mode;
  }
};

function savePrediction(matchId){
  if(!ensureUser()) return;
  const m = matches[matchId];
  if(!m) return;

  // لو الأدمن قفل كل التوقعات
  if(globalLocked){
    alert("التوقعات متقفلة دلوقتي من الأدمن. 🔒");
    return;
  }

  // لو التوقع مقفول منعه
  const pred = myPredictions[matchId];
  if(pred && pred.locked){
    alert("التوقع ده مقفول ومش ممكن تغيره. 🔒");
    return;
  }

  const scoreAEl = document.querySelector(`.score-box[data-id="${matchId}"][data-side="A"]`);
  const scoreBEl = document.querySelector(`.score-box[data-id="${matchId}"][data-side="B"]`);
  const scoreA = scoreAEl.value;
  const scoreB = scoreBEl.value;
  if(scoreA==="" || scoreB===""){
    alert("اكتب نتيجة للفريقين الاتنين قبل الحفظ.");
    return;
  }

  // هل ده double؟
  const round = m.round;
  const isDoubleOnThis = doubleUsed[round] === matchId + "__locked";
  
  // اعرض modal التأكيد
  const dblNote = isDoubleOnThis
    ? `<span class="double-note">⚡ Double مفعّل — النقاط هتتضاعف لو صح!</span>` : "";
  document.querySelector(".modal-icon").textContent = "🔒";
  document.querySelector(".modal-title").textContent = "تأكيد التوقع";
  confirmOk.textContent = "تأكيد وقفل";
  confirmModalBody.innerHTML = `
    <span>${m.teamA} <b>vs</b> ${m.teamB}</span>
    <span class="highlight">${scoreA} — ${scoreB}</span>
    لو حفظت، التوقع ده هيتقفل ومش هتقدر تغيره.
    ${dblNote}
  `;
  confirmModal.dataset.mode = "prediction";
  pendingConfirm = {matchId, scoreA, scoreB, isDouble: isDoubleOnThis, round};
  confirmModal.classList.add("open");
}

function doSavePrediction({matchId, scoreA, scoreB, isDouble, round}){
  const docId = `${matchId}__${userId}`;

  // doubleUsed[round] اتقفل بالفعل من confirmDouble modal

  const data = {
    matchId, uid: userId, userName,
    scoreA: Number(scoreA), scoreB: Number(scoreB),
    locked: true,
    isDouble: !!isDouble,
    updatedAt: Date.now()
  };
  myPredictions[matchId] = {scoreA, scoreB, locked: true, isDouble: !!isDouble};

  // doubleUsed يتحدد من Firestore — مش محتاجين localStorage

  if(db){
    db.collection("predictions").doc(docId).set(data)
      .then(()=>{
        flashSaved(matchId);
        renderMain(); // لتحديث القفل
      })
      .catch(err=>{ console.error(err); alert("حصل خطأ في الحفظ."); });
  } else {
    flashSaved(matchId);
    renderMain();
  }
}

function flashSaved(matchId){
  const tag = document.getElementById(`saved_${matchId}`);
  if(tag){
    tag.textContent = "تم الحفظ ✅";
    setTimeout(()=>{ if(tag) tag.textContent=""; }, 2500);
  }
}

function confirmDouble(matchId, round, m){
  if(!ensureUser()) return;
  // دايماً يفتح modal التأكيد — مفيش إلغاء تلقائي
  confirmModal.dataset.mode = "double";
  confirmModal.dataset.matchId = matchId;
  confirmModal.dataset.round = round;
  document.querySelector(".modal-icon").textContent = "⚡";
  document.querySelector(".modal-title").textContent = "تأكيد الـ Double";
  confirmModalBody.innerHTML = `
    <span>${m.teamA} <b>vs</b> ${m.teamB}</span>
    <span class="highlight" style="font-size:15px;margin:8px 0;">ده هيضاعف نقاطك على المباراة دي</span>
    لو أكدت، الـ Double هيتقفل ومش هتقدر تغييره ولا تستخدمه في مباراة تانية في نفس الراوند.
    <span class="double-note">⚡ مرة واحدة بس في كل راوند — اختار بعقلك!</span>
  `;
  confirmOk.textContent = "تأكيد وقفل الـ Double ⚡";

}

// toggleDouble removed — double يتقفل فقط عبر confirmDouble modal

function saveResult(matchId){
  const aEl = document.querySelector(`.admin-score[data-result-id="${matchId}"][data-side="A"]`);
  const bEl = document.querySelector(`.admin-score[data-result-id="${matchId}"][data-side="B"]`);
  if(aEl.value==="" || bEl.value===""){
    alert("اكتب النتيجة كاملة (الفريقين) قبل الحفظ.");
    return;
  }
  const resultA = Number(aEl.value), resultB = Number(bEl.value);
  if(db){
    db.collection("matches").doc(matchId).set({resultA, resultB}, {merge:true})
      .catch(err=>console.error(err));
  } else {
    matches[matchId].resultA = resultA;
    matches[matchId].resultB = resultB;
    renderMain();
  }
}

function saveTeamName(matchId, side, value){
  if(!value) return;
  const field = side==="A" ? "teamA" : "teamB";
  if(db){
    db.collection("matches").doc(matchId).set({[field]: value}, {merge:true})
      .catch(err=>console.error(err));
  } else {
    matches[matchId][field] = value;
  }
}

/* ============================================================
   8) الترتيب (Leaderboard)
   ============================================================ */
function renderLeaderboard(){
  const totals = {}; // uid -> {name, pts, exact, winner, played}

  // اتأكد إن كل المسجلين (حتى اللي لسه ماتوقعوش) يظهروا في الترتيب بـ 0 نقطة
  Object.entries(allUsers).forEach(([uid, u])=>{
    totals[uid] = {name:u.name || u.email || "لاعب", pts:0, exact:0, winner:0, played:0};
  });

  allPredictions.forEach(p=>{
    const m = matches[p.matchId];
    if(!m) return;
    const uid = p.uid || p.userName; // توافق مع توقعات قديمة كانت بالاسم بس
    if(!totals[uid]) totals[uid] = {name: p.userName || "لاعب", pts:0, exact:0, winner:0, played:0};
    const hasResult = m.resultA!==undefined && m.resultA!==null && m.resultB!==undefined && m.resultB!==null;
    if(!hasResult) return;
    let pts = calcPoints(p.scoreA, p.scoreB, m.resultA, m.resultB);
    if(pts===null) return;
    if(p.isDouble) pts = pts * 2;
    totals[uid].pts += pts;
    totals[uid].played += 1;
    if(pts===3) totals[uid].exact += 1;
    if(pts===1) totals[uid].winner += 1;
  });

  const rows = Object.entries(totals)
    .map(([uid, t])=>({uid, ...t}))
    .sort((a,b)=> b.pts-a.pts);

  const wrap = document.createElement("div");

  if(rows.length===0){
    wrap.innerHTML = `<div class="empty">مفيش لاعبين مسجلين لسه. أول ما حد يعمل حساب جديد، هيظهر هنا تلقائي.</div>`;
    mainArea.innerHTML = "";
    mainArea.appendChild(wrap);
    return;
  }

  const medal = (i)=> i===0?"🥇": i===1?"🥈": i===2?"🥉": (i+1);
  const rankClass = (i)=> i===0?"rank gold-1": i===1?"rank silver-2": i===2?"rank bronze-3":"rank";

  wrap.innerHTML = `
    <div class="leaderboard">
      <table>
        <thead>
          <tr>
            <th>#</th><th>اللاعب</th><th>نتايج مضبوطة</th><th>فايز صحيح</th><th>مباريات محسوبة</th><th>النقاط</th>
          </tr>
        </thead>
        <tbody>
          ${rows.map((r,i)=>`
            <tr class="${r.uid===userId ? 'you-row':''}">
              <td class="${rankClass(i)}">${medal(i)}</td>
              <td>${r.name}${r.uid===userId? " (انت)":""}</td>
              <td>${r.exact}</td>
              <td>${r.winner}</td>
              <td>${r.played}</td>
              <td class="total-pts">${r.pts}</td>
            </tr>
          `).join("")}
        </tbody>
      </table>
    </div>
  `;
  mainArea.innerHTML = "";
  mainArea.appendChild(wrap);
}

/* ============================================================
   9) Router رئيسي
   ============================================================ */
function renderMain(){
  if(activeTab==="الترتيب"){
    renderLeaderboard();
  } else {
    renderMatchesForRound(activeTab);
  }
}

/* ============================================================
   10) تسجيل الدخول بالاسم + وضع الأدمن
   ============================================================ */
function ensureUser(){
  if(!userId){
    alert("لازم تسجّل دخول الأول من فوق.");
    return false;
  }
  return true;
}

/* ============================================================
   11) Firestore listeners
   ============================================================ */
function seedMatchesIfEmpty(){
  if(!db) return;
  db.collection("matches").limit(1).get().then(snap=>{
    if(snap.empty){
      const batch = db.batch();
      SEED_MATCHES.forEach(m=>{
        const ref = db.collection("matches").doc(m.id);
        batch.set(ref, m);
      });
      batch.commit().catch(err=>console.error("seed error", err));
    }
  });
}

function listenMatches(){
  if(!db){
    SEED_MATCHES.forEach(m=> matches[m.id]=m);
    setConn("وضع محلي (بدون مشاركة) — ضيف بيانات Firebase", false);
    renderMain();
    return;
  }
  db.collection("matches").onSnapshot(snap=>{
    snap.forEach(doc=>{
      matches[doc.id] = doc.data();
    });
    setConn("متصل ومتزامن مع صحابك", true);
    renderMain();
  }, err=>{
    console.error(err);
    setConn("خطأ في الاتصال بـ Firebase", false);
  });
}

function listenAllPredictions(){
  if(!db) return;
  db.collection("predictions").onSnapshot(snap=>{
    allPredictions = snap.docs.map(d=>d.data());
    if(activeTab==="الترتيب") renderMain();
  });
}

function loadMyPredictions(){
  if(!db || !userId) return;
  db.collection("predictions").where("uid","==",userId).get().then(snap=>{
    myPredictions = {};
    doubleUsed = {}; // إعادة بناء من Firestore مش من localStorage
    snap.forEach(doc=>{
      const d = doc.data();
      myPredictions[d.matchId] = {
        scoreA: String(d.scoreA),
        scoreB: String(d.scoreB),
        locked: !!d.locked,
        isDouble: !!d.isDouble
      };
      // لو فيه double مقفول، سجّله في doubleUsed
      if(d.isDouble){
        const m = matches[d.matchId];
        if(m) doubleUsed[m.round] = d.matchId + "__locked";
      }
    });
    renderMain();
  });
}

function listenUsers(){
  if(!db) return;
  db.collection("users").onSnapshot(snap=>{
    allUsers = {};
    snap.forEach(doc=>{ allUsers[doc.id] = doc.data(); });
    if(activeTab==="الترتيب") renderMain();
  });
}

/* ============================================================
   إدارة الـ Double (أدمن)
   ============================================================ */
function openManageDoublePanel(){
  // اجمع كل اليوزرز اللي عندهم double في أي راوند
  const usersWithDouble = {};
  allPredictions.forEach(p=>{
    if(p.isDouble){
      const m = matches[p.matchId];
      if(!m) return;
      const uid = p.uid || p.userName;
      const name = p.userName || uid;
      if(!usersWithDouble[uid]) usersWithDouble[uid] = {name, doubles:[]};
      usersWithDouble[uid].doubles.push({matchId: p.matchId, round: m.round, teamA: m.teamA, teamB: m.teamB});
    }
  });

  const entries = Object.entries(usersWithDouble);

  document.querySelector(".modal-icon").textContent = "⚡";
  document.querySelector(".modal-title").textContent = "إدارة الـ Double";
  confirmOk.style.display = "none";
  confirmCancel.textContent = "إغلاق";

  if(entries.length === 0){
    confirmModalBody.innerHTML = `<div style="color:var(--muted);padding:10px 0;">مفيش حد استخدم الـ Double لحد دلوقتي.</div>`;
  } else {
    confirmModalBody.innerHTML = `
      <div style="text-align:right;width:100%;">
        ${entries.map(([uid, u])=>`
          <div style="background:var(--bg-deep);border:1px solid var(--line);border-radius:10px;padding:12px;margin-bottom:10px;">
            <div style="font-family:'Oswald',sans-serif;color:var(--cream);font-size:14px;margin-bottom:8px;">👤 ${u.name}</div>
            ${u.doubles.map(d=>`
              <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap;">
                <span style="font-size:12px;color:var(--gold);flex:1;">⚡ ${d.teamA} vs ${d.teamB} <span style="color:var(--muted)">(${d.round})</span></span>
                <button class="btn small" style="background:var(--danger);border-color:var(--danger);color:white;font-size:11px;padding:5px 10px;" 
                  onclick="adminRemoveDouble('${uid}','${d.matchId}')">إلغاء Double</button>
              </div>
            `).join("")}
          </div>
        `).join("")}
      </div>
    `;
  }
  confirmModal.dataset.mode = "manage";
  confirmModal.classList.add("open");
}

function adminRemoveDouble(uid, matchId){
  if(!db){ alert("Firebase غير متصل."); return; }
  const docId = `${matchId}__${uid}`;
  db.collection("predictions").doc(docId).set({isDouble: false}, {merge:true})
    .then(()=>{
      // امسح من doubleUsed لو ده نفس اليوزر الحالي
      if(uid === userId){
        const m = matches[matchId];
        if(m) delete doubleUsed[m.round];
      }
      // حدّث allPredictions محلياً
      const idx = allPredictions.findIndex(p=> p.uid===uid && p.matchId===matchId);
      if(idx !== -1) allPredictions[idx].isDouble = false;
      // افتح البانيل تاني بعد التحديث
      openManageDoublePanel();
    })
    .catch(err=>{ console.error(err); alert("حصل خطأ."); });
}

/* ============================================================
   Firestore Settings Listener (globalLocked)
   ============================================================ */
function listenSettings(onReady){
  if(!db){
    onReady && onReady();
    return;
  }
  let firstRead = true;
  db.collection("settings").doc("global").onSnapshot(doc=>{
    const prev = globalLocked;
    globalLocked = doc.exists ? !!doc.data().predictionsLocked : false;
    if(firstRead){
      firstRead = false;
      onReady && onReady(); // ابدأ باقي الـ listeners بعد ما القيمة اتقرأت
    } else if(prev !== globalLocked){
      renderMain(); // تحديث مباشر لو اتغيرت بعدين
    }
  }, err=>{
    console.error("settings listener error", err);
    onReady && onReady(); // حتى لو فيه error، ابدأ عادي
  });
}

/* ============================================================
   تشغيل
   ============================================================ */
setAuthMode("login");
renderTabs();
seedMatchesIfEmpty();
// اقرأ الـ settings الأول، وبعدين ابدأ باقي الـ listeners
listenSettings(()=>{
  listenMatches();
  listenAllPredictions();
  listenUsers();
});

(function restoreSession(){
  const savedUid = localStorage.getItem("wc2026_uid");
  const savedName = localStorage.getItem("wc2026_name");
  if(savedUid && savedName && db){
    // تحقق إن الأكونت لسه موجود
    db.collection("accounts").doc(savedUid).get().then(doc=>{
      if(doc.exists){
        onLoggedIn(savedUid, savedName);
      } else {
        localStorage.removeItem("wc2026_uid");
        localStorage.removeItem("wc2026_name");
      }
    }).catch(()=>{});
  }
})();
