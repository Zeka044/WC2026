<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>توقعات كأس العالم 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore-compat.js"></script>
<style>
:root{
  --bg:#0B1A14;--bg-deep:#06120D;--surface:#122821;--surface-2:#17332A;
  --line:#26473C;--gold:#D9A53C;--gold-soft:#8C7232;--mint:#46B59B;
  --mint-dim:#2D6E5D;--cream:#F3EFE3;--muted:#8FA89F;--danger:#C0523F;--radius:14px;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:radial-gradient(circle at 15% 0%,rgba(70,181,155,.08),transparent 40%),
    radial-gradient(circle at 85% 10%,rgba(217,165,60,.06),transparent 35%),var(--bg);
  color:var(--cream);font-family:'Tajawal','Inter',sans-serif;min-height:100vh;padding-bottom:60px;
}
.scoreboard-font{font-family:'Oswald','Tajawal',sans-serif;}
@keyframes fadeInUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(70,181,155,.4)}50%{box-shadow:0 0 0 8px rgba(70,181,155,0)}}
@keyframes goldPulse{0%,100%{box-shadow:0 0 0 0 rgba(217,165,60,.5)}50%{box-shadow:0 0 0 10px rgba(217,165,60,0)}}
@keyframes floatFlag{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
@keyframes slideDown{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:translateY(0)}}
@keyframes countUp{from{opacity:0;transform:scale(.7)}to{opacity:1;transform:scale(1)}}
@keyframes shimmerGold{0%{background-position:200% center}100%{background-position:-200% center}}
.card-enter{animation:fadeInUp .38s ease both;}
header.top{
  position:relative;padding:32px 20px 28px;
  background:linear-gradient(180deg,var(--bg-deep),rgba(11,26,20,.97));
  border-bottom:1px solid var(--line);overflow:hidden;
}
header.top::before{
  content:"";position:absolute;inset:0;
  background-image:repeating-linear-gradient(90deg,rgba(255,255,255,.02) 0 1px,transparent 1px 90px),
    repeating-linear-gradient(0deg,rgba(255,255,255,.01) 0 1px,transparent 1px 60px);
  pointer-events:none;
}
.header-deco{
  position:absolute;width:280px;height:280px;border-radius:50%;
  background:radial-gradient(circle,rgba(217,165,60,.05) 0%,transparent 70%);
  bottom:-80px;right:5%;pointer-events:none;
}
.top-inner{max-width:980px;margin:0 auto;position:relative;z-index:1;}
.eyebrow{
  color:var(--gold);font-size:11px;letter-spacing:4px;font-weight:700;text-transform:uppercase;
  font-family:'Oswald',sans-serif;display:inline-flex;align-items:center;gap:8px;margin-bottom:6px;
}
.eyebrow::before,.eyebrow::after{content:"";display:inline-block;width:20px;height:1px;background:var(--gold);opacity:.5;}
h1.title{
  font-family:'Oswald',sans-serif;font-size:clamp(28px,5vw,46px);margin:2px 0 6px;
  color:var(--cream);letter-spacing:1px;line-height:1.1;
}
.title .wc-badge{
  display:inline-block;
  background:linear-gradient(135deg,var(--gold),#f0c060);
  background-size:200% auto;
  animation:shimmerGold 3s linear infinite;
  color:var(--bg-deep);font-size:clamp(10px,1.5vw,13px);padding:3px 10px;
  border-radius:20px;vertical-align:middle;margin-left:6px;font-weight:700;letter-spacing:1px;
}
.title .accent{color:var(--mint);}
p.sub{color:var(--muted);margin:4px 0 20px;font-size:14px;line-height:1.6;}
.btn{
  background:var(--mint-dim);color:var(--cream);border:1px solid var(--mint);
  padding:11px 18px;border-radius:10px;font-weight:700;cursor:pointer;
  font-family:'Tajawal',sans-serif;font-size:14px;transition:all .2s ease;position:relative;overflow:hidden;
}
.btn:hover{background:var(--mint);transform:translateY(-1px);box-shadow:0 4px 16px rgba(70,181,155,.3);}
.btn:active{transform:scale(.97) translateY(0);}
.btn.ghost{background:transparent;border:1px solid var(--line);color:var(--muted);}
.btn.ghost:hover{border-color:var(--gold);color:var(--gold);background:rgba(217,165,60,.06);box-shadow:none;transform:translateY(-1px);}
.btn.gold{background:transparent;border:1px solid var(--gold-soft);color:var(--gold);}
.btn.gold:hover{background:var(--gold);color:var(--bg-deep);box-shadow:0 4px 16px rgba(217,165,60,.35);}
.btn.small{padding:7px 12px;font-size:12.5px;}
.btn.danger-btn{background:rgba(192,82,63,.12);border-color:var(--danger);color:var(--danger);}
.btn.danger-btn:hover{background:var(--danger);color:white;box-shadow:0 4px 16px rgba(192,82,63,.35);}
.status-pill{
  font-size:11.5px;color:var(--muted);border:1px solid var(--line);
  padding:5px 12px;border-radius:20px;font-family:'Oswald',sans-serif;letter-spacing:.5px;
  display:inline-flex;align-items:center;gap:5px;transition:all .3s;
}
.status-pill::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--muted);transition:background .3s;}
.status-pill.live{border-color:var(--mint);color:var(--mint);}
.status-pill.live::before{background:var(--mint);animation:pulse 1.5s infinite;}
.auth-box{
  background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
  padding:18px;max-width:420px;animation:slideDown .4s ease;box-shadow:0 8px 32px rgba(0,0,0,.3);
}
.auth-tabs{display:flex;gap:6px;margin-bottom:14px;}
.auth-tab{
  flex:1;text-align:center;padding:9px 10px;border-radius:8px;border:1px solid var(--line);
  background:transparent;color:var(--muted);cursor:pointer;font-family:'Oswald',sans-serif;
  font-size:13px;letter-spacing:.5px;transition:all .2s;
}
.auth-tab.active{background:var(--mint-dim);border-color:var(--mint);color:var(--cream);font-weight:600;}
.auth-form{display:flex;flex-direction:column;gap:8px;}
.auth-form input{
  background:var(--bg-deep);border:1px solid var(--line);color:var(--cream);
  padding:12px 14px;border-radius:10px;font-size:14px;font-family:'Tajawal',sans-serif;
  transition:border-color .2s,box-shadow .2s;
}
.auth-form input:focus{outline:none;border-color:var(--mint);box-shadow:0 0 0 3px rgba(70,181,155,.15);}
.auth-error{color:var(--danger);font-size:12.5px;margin-top:6px;min-height:14px;}
.user-box{display:flex;flex-wrap:wrap;gap:10px;align-items:center;animation:fadeIn .4s ease;}
.user-box .welcome{font-family:'Oswald',sans-serif;color:var(--cream);font-size:14px;}
.user-box .welcome b{color:var(--gold);}
nav.tabs{
  max-width:980px;margin:20px auto 0;display:flex;gap:8px;overflow-x:auto;
  padding:4px 20px 14px;scrollbar-width:none;border-bottom:1px solid var(--line);
}
nav.tabs::-webkit-scrollbar{display:none;}
.tab{
  flex:0 0 auto;padding:9px 18px;border-radius:30px;border:1px solid var(--line);
  color:var(--muted);font-family:'Oswald',sans-serif;font-size:13px;letter-spacing:.5px;
  cursor:pointer;white-space:nowrap;background:var(--surface);transition:all .2s ease;
}
.tab:hover:not(.active){border-color:var(--mint-dim);color:var(--mint);background:rgba(70,181,155,.06);}
.tab.active{
  background:linear-gradient(135deg,var(--gold),#e8b84b);color:var(--bg-deep);
  border-color:var(--gold);font-weight:700;box-shadow:0 4px 14px rgba(217,165,60,.3);
}
main{max-width:980px;margin:0 auto;padding:12px 20px 40px;}
.round-heading{display:flex;align-items:center;gap:12px;margin:28px 0 16px;}
.round-heading h2{font-family:'Oswald',sans-serif;font-size:18px;color:var(--gold);margin:0;letter-spacing:1px;}
.round-heading .count{
  color:var(--muted);font-size:12px;background:var(--surface);border:1px solid var(--line);
  padding:3px 10px;border-radius:20px;font-family:'Oswald',sans-serif;
}
.round-heading::after{content:"";flex:1;height:1px;background:linear-gradient(90deg,var(--line),transparent);}
.match-card{
  background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
  padding:18px 20px;margin-bottom:14px;display:flex;flex-direction:column;gap:14px;
  transition:border-color .25s,box-shadow .25s,transform .2s;position:relative;overflow:hidden;
}
.match-card::before{
  content:"";position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--line),transparent);transition:background .3s;
}
.match-card:hover{border-color:rgba(70,181,155,.3);box-shadow:0 6px 28px rgba(0,0,0,.25);transform:translateY(-2px);}
.match-card:hover::before{background:linear-gradient(90deg,transparent,var(--mint-dim),transparent);}
.match-meta{
  display:flex;justify-content:space-between;align-items:center;
  font-size:12px;color:var(--muted);font-family:'Oswald',sans-serif;letter-spacing:.3px;
}
.match-info-left{display:flex;align-items:center;gap:8px;}
.match-date-badge{
  background:var(--bg-deep);border:1px solid var(--line);border-radius:6px;
  padding:3px 8px;font-size:11px;color:var(--mint);font-family:'Oswald',sans-serif;
}
.pts.p3{color:var(--gold);font-weight:700;}
.pts.p1{color:var(--mint);font-weight:700;}
.pts.p0{color:var(--danger);font-weight:700;}
.teams-row{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:12px;}
.team{display:flex;flex-direction:column;gap:8px;align-items:center;text-align:center;}
.team-flag-emoji{
  width:72px;height:48px;object-fit:cover;border-radius:6px;display:block;
  box-shadow:0 2px 8px rgba(0,0,0,.45);
  border:1px solid rgba(255,255,255,.08);
  transition:transform .25s cubic-bezier(.34,1.56,.64,1);
  cursor:default;
  animation:floatFlag 4s ease-in-out infinite;
}
.team:nth-child(3) .team-flag-emoji{animation-delay:1.2s;}
.team-flag-emoji:hover{transform:scale(1.12) rotate(-3deg);}
.team-flag-placeholder{
  width:72px;height:48px;border-radius:6px;background:var(--surface-2);
  border:1px dashed var(--line);display:flex;align-items:center;justify-content:center;
  font-size:22px;color:var(--muted);
}
/* Admin flag picker */
.flag-picker-wrap{position:relative;display:inline-block;}
.flag-picker-btn{
  background:none;border:1px dashed var(--gold-soft);border-radius:5px;
  cursor:pointer;padding:2px 5px;font-size:11px;color:var(--gold);
  font-family:'Oswald',sans-serif;margin-top:4px;display:block;width:100%;transition:all .2s;
}
.flag-picker-btn:hover{background:rgba(217,165,60,.12);border-color:var(--gold);}
.flag-dropdown{
  position:absolute;z-index:999;top:100%;left:50%;transform:translateX(-50%);
  background:var(--surface);border:1px solid var(--line);border-radius:10px;
  box-shadow:0 8px 32px rgba(0,0,0,.5);padding:8px;width:260px;max-height:240px;
  overflow-y:auto;display:none;margin-top:4px;
}
.flag-dropdown.open{display:block;animation:slideDown .2s ease;}
.flag-dropdown input.flag-search{
  width:100%;background:var(--bg-deep);border:1px solid var(--line);
  color:var(--cream);padding:7px 10px;border-radius:7px;font-size:12px;
  font-family:'Tajawal',sans-serif;margin-bottom:6px;
}
.flag-dropdown input.flag-search:focus{outline:none;border-color:var(--mint);}
.flag-option{
  display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:7px;
  cursor:pointer;transition:background .15s;font-size:12.5px;color:var(--cream);
  font-family:'Tajawal',sans-serif;
}
.flag-option:hover{background:rgba(70,181,155,.12);}
.flag-option img{width:30px;height:20px;object-fit:cover;border-radius:3px;border:1px solid rgba(255,255,255,.1);}
.flag-option.no-flag{color:var(--muted);font-style:italic;}
.team-name{
  font-family:'Tajawal',sans-serif;font-weight:700;font-size:15px;color:var(--cream);
  background:transparent;border:none;text-align:center;width:100%;
  border-bottom:1px dashed transparent;transition:color .2s;
}
.team-name[contenteditable="true"]{border-bottom:1px dashed var(--gold-soft);cursor:text;outline:none;}
.team-name[contenteditable="true"]:focus{color:var(--gold);}
.score-box{
  width:56px;height:56px;background:var(--bg-deep);border:1.5px solid var(--line);
  border-radius:10px;text-align:center;color:var(--gold);font-family:'Oswald',sans-serif;
  font-size:28px;font-weight:600;transition:border-color .2s,box-shadow .2s;
}
.score-box:focus{outline:none;border-color:var(--mint);box-shadow:0 0 0 3px rgba(70,181,155,.2);}
.score-box:not(:disabled):hover{border-color:var(--mint-dim);}
.score-box:disabled{opacity:.55;cursor:not-allowed;border-color:var(--line);color:var(--muted);}
.vs-block{display:flex;flex-direction:column;align-items:center;gap:6px;}
.vs-label{
  color:var(--muted);font-family:'Oswald',sans-serif;font-size:12px;letter-spacing:3px;
  background:var(--surface-2);border:1px solid var(--line);border-radius:6px;padding:4px 8px;
}
.actual-row{
  display:flex;justify-content:center;align-items:center;gap:14px;
  background:linear-gradient(135deg,rgba(70,181,155,.07),rgba(70,181,155,.02));
  border:1px solid var(--mint-dim);border-radius:10px;padding:10px 16px;
  font-family:'Oswald',sans-serif;animation:fadeIn .3s ease;
}
.actual-row .lbl{color:var(--muted);font-size:12px;letter-spacing:1px;}
.actual-row .score{color:var(--mint);font-size:22px;font-weight:700;letter-spacing:2px;}
.actual-row input.admin-score{
  width:42px;height:36px;background:var(--surface-2);border:1px solid var(--gold-soft);
  color:var(--gold);text-align:center;border-radius:6px;font-family:'Oswald',sans-serif;font-size:16px;
  transition:border-color .2s;
}
.actual-row input.admin-score:focus{outline:none;border-color:var(--gold);}
.card-footer{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;}
.saved-tag{font-size:12px;color:var(--mint);font-family:'Oswald',sans-serif;animation:countUp .3s ease;}
.lock-badge{
  display:inline-flex;align-items:center;gap:5px;font-size:11.5px;color:var(--muted);
  background:var(--surface-2);border:1px solid var(--line);border-radius:8px;
  padding:5px 12px;font-family:'Oswald',sans-serif;letter-spacing:.5px;
}
.global-lock-banner{
  background:linear-gradient(135deg,rgba(192,82,63,.12),rgba(192,82,63,.04));
  border:1.5px solid var(--danger);border-radius:10px;padding:12px 18px;
  font-family:'Oswald',sans-serif;font-size:13px;color:var(--danger);letter-spacing:.5px;
  margin-bottom:14px;text-align:center;display:flex;align-items:center;justify-content:center;gap:8px;
  animation:slideDown .3s ease;
}

/* ===== DOUBLE — redesigned ===== */
.double-section{
  background:linear-gradient(135deg,rgba(217,165,60,.07) 0%,rgba(6,18,13,.5) 100%);
  border:1.5px solid rgba(140,114,50,.5);border-radius:12px;padding:12px 16px;
  display:flex;align-items:center;gap:12px;position:relative;overflow:hidden;transition:all .3s;
}
.double-section.is-active{
  background:linear-gradient(135deg,rgba(217,165,60,.15) 0%,rgba(217,165,60,.04) 100%);
  border-color:var(--gold);animation:goldPulse 2s infinite;
}
.double-section-icon{font-size:28px;line-height:1;flex-shrink:0;filter:drop-shadow(0 0 6px rgba(217,165,60,.5));}
.double-section-label{
  font-family:'Oswald',sans-serif;font-size:13px;color:var(--gold);
  letter-spacing:1px;text-transform:uppercase;flex:1;line-height:1.3;
}
.double-section-label small{
  display:block;font-size:11px;color:var(--muted);letter-spacing:0;text-transform:none;
  margin-top:3px;font-family:'Tajawal',sans-serif;font-weight:400;
}
.btn.double-btn{
  background:linear-gradient(135deg,rgba(217,165,60,.15),rgba(217,165,60,.05));
  border:1.5px solid var(--gold-soft);color:var(--gold);font-family:'Oswald',sans-serif;
  font-size:12.5px;letter-spacing:.8px;padding:9px 18px;border-radius:9px;
  cursor:pointer;transition:all .25s;white-space:nowrap;display:flex;align-items:center;gap:6px;
}
.btn.double-btn:hover:not(:disabled){
  background:linear-gradient(135deg,var(--gold),#e8b84b);color:var(--bg-deep);
  border-color:var(--gold);box-shadow:0 0 20px rgba(217,165,60,.4);transform:translateY(-1px);
}
.btn.double-btn:disabled{cursor:not-allowed;opacity:.4;}
.double-locked-badge{
  display:inline-flex;align-items:center;gap:6px;
  background:linear-gradient(135deg,rgba(217,165,60,.18),rgba(140,114,50,.08));
  border:1.5px solid var(--gold);border-radius:8px;padding:7px 14px;
  font-family:'Oswald',sans-serif;font-size:12px;color:var(--gold);
  letter-spacing:.5px;animation:countUp .3s ease;
}
.match-card.double-locked{
  border-color:rgba(217,165,60,.5);
  background:linear-gradient(160deg,rgba(217,165,60,.08) 0%,var(--surface) 60%);
  box-shadow:0 0 0 1px rgba(217,165,60,.15),0 6px 28px rgba(217,165,60,.07);
}
.match-card.double-locked::before{
  background:linear-gradient(90deg,rgba(217,165,60,.5),rgba(217,165,60,.1),transparent);
}

/* Admin bar */
.match-card.match-locked{
  border-color:rgba(192,82,63,.4);
  background:linear-gradient(160deg,rgba(192,82,63,.06) 0%,var(--surface) 60%);
}
.match-card.match-locked::before{
  background:linear-gradient(90deg,rgba(192,82,63,.5),rgba(192,82,63,.1),transparent);
}
.admin-bar{
  display:flex;gap:8px;align-items:center;flex-wrap:wrap;
  background:linear-gradient(135deg,rgba(217,165,60,.06),rgba(217,165,60,.02));
  border:1px solid var(--gold-soft);border-radius:12px;
  padding:12px 16px;margin-bottom:20px;font-size:13px;animation:slideDown .3s ease;
}

/* Leaderboard */
.leaderboard{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,.2);}
table{width:100%;border-collapse:collapse;}
thead th{
  text-align:right;font-family:'Oswald',sans-serif;font-size:11.5px;letter-spacing:1.5px;
  color:var(--muted);padding:14px 16px;border-bottom:1px solid var(--line);
  background:linear-gradient(180deg,var(--surface-2),var(--surface));text-transform:uppercase;
}
tbody td{padding:14px 16px;border-bottom:1px solid rgba(38,71,60,.5);font-size:14px;transition:background .15s;}
tbody tr:last-child td{border-bottom:none;}
tbody tr:hover td{background:rgba(255,255,255,.02);}
.rank{font-family:'Oswald',sans-serif;font-weight:700;color:var(--gold);width:42px;font-size:16px;}
.rank.gold-1{font-size:20px;}
.rank.silver-2{color:#C9C9C9;}
.rank.bronze-3{color:#C98B4F;}
.total-pts{font-family:'Oswald',sans-serif;font-weight:700;color:var(--mint);font-size:18px;}
.you-row td{background:rgba(70,181,155,.06)!important;}
.player-name-cell{display:flex;align-items:center;gap:8px;}
.empty{text-align:center;color:var(--muted);padding:50px 10px;font-size:14px;line-height:2;}
.empty-icon{font-size:40px;display:block;margin-bottom:10px;}

/* Modal */
.modal-backdrop{
  position:fixed;inset:0;background:rgba(6,18,13,.87);backdrop-filter:blur(6px);
  z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;
  opacity:0;pointer-events:none;transition:opacity .25s;
}
.modal-backdrop.open{opacity:1;pointer-events:all;}
.modal{
  background:linear-gradient(160deg,var(--surface-2),var(--surface));
  border:1px solid var(--line);border-radius:18px;padding:30px 26px;max-width:390px;width:100%;
  text-align:center;transform:translateY(16px) scale(.97);
  transition:transform .28s cubic-bezier(.34,1.56,.64,1),opacity .25s;
  box-shadow:0 24px 64px rgba(0,0,0,.6);opacity:0;
}
.modal-backdrop.open .modal{transform:translateY(0) scale(1);opacity:1;}
.modal-icon{font-size:36px;margin-bottom:12px;display:block;}
.modal-title{font-family:'Oswald',sans-serif;font-size:20px;color:var(--cream);margin:0 0 8px;letter-spacing:.5px;}
.modal-body{color:var(--muted);font-size:14px;line-height:1.7;margin-bottom:22px;}
.modal-body .highlight{
  color:var(--gold);font-weight:700;font-family:'Oswald',sans-serif;font-size:22px;
  display:block;margin:10px 0;letter-spacing:1px;
}
.modal-body .double-note{
  color:var(--mint);font-size:12.5px;background:rgba(70,181,155,.08);
  border:1px solid var(--mint-dim);border-radius:8px;padding:8px 12px;

function setConn(text,live){connStatus.textContent=text;connStatus.classList.toggle("live",!!live);}
if(!firebaseReady)setConn("Firebase غير متصل",false);

function setAuthMode(mode){
  authMode=mode;
  tabLogin.classList.toggle("active",mode==="login");tabSignup.classList.toggle("active",mode==="signup");
  signupNameInput.style.display=mode==="signup"?"block":"none";
  authSubmitBtn.textContent=mode==="signup"?"إنشاء الحساب":"دخول";authError.textContent="";
}
tabLogin.onclick=()=>setAuthMode("login");tabSignup.onclick=()=>setAuthMode("signup");

authSubmitBtn.onclick=async()=>{
  if(!db){alert("Firebase غير متصل.");return;}
  const username=authEmailInput.value.trim().toLowerCase(),password=authPasswordInput.value.trim();
  authError.textContent="";
  if(!username||!password){authError.textContent="اكتب اليوزر نيم والباسورد.";return;}
  if(!/^\d+$/.test(password)){authError.textContent="الباسورد لازم يكون أرقام بس.";return;}
  authSubmitBtn.disabled=true;authSubmitBtn.textContent="جاري…";
  try{
    if(authMode==="signup"){
      const displayName=signupNameInput.value.trim();
      if(!displayName){authError.textContent="اكتب اسمك الأول.";authSubmitBtn.disabled=false;authSubmitBtn.textContent="إنشاء الحساب";return;}
      const existing=await db.collection("accounts").doc(username).get();
      if(existing.exists){authError.textContent="اليوزر نيم ده موجود قبل كده.";authSubmitBtn.disabled=false;authSubmitBtn.textContent="إنشاء الحساب";return;}
      await db.collection("accounts").doc(username).set({username,password,displayName,createdAt:Date.now()});
      await db.collection("users").doc(username).set({name:displayName,username,createdAt:Date.now()});
      onLoggedIn(username,displayName);
    }else{
      const doc=await db.collection("accounts").doc(username).get();
      if(!doc.exists){authError.textContent="اليوزر نيم ده مش موجود.";authSubmitBtn.disabled=false;authSubmitBtn.textContent="دخول";return;}
      const data=doc.data();
      if(data.password!==password){authError.textContent="الباسورد غلط.";authSubmitBtn.disabled=false;authSubmitBtn.textContent="دخول";return;}
      onLoggedIn(username,data.displayName);

function calcPoints(pA,pB,aA,aB){
  if(aA==null||aB==null||pA==null||pB==null)return null;
  if(pA===aA&&pB===aB)return 3;
  if(Math.sign(pA-pB)===Math.sign(aA-aB))return 1;
  return 0;
}

function renderMatchesForRound(round){
  const list=Object.values(matches).filter(m=>m.round===round).sort((a,b)=>a.order-b.order);
  if(!list.length){mainArea.innerHTML=`<div class="empty"><span class="empty-icon">⏳</span>لسه مفيش مباريات في هذا الدور.</div>`;return;}

    const bar=document.createElement("div");bar.className="admin-bar";

      <div style="display:flex;flex-wrap:wrap;gap:8px;align-items:center;width:100%;">

      </div>
      <div style="display:flex;flex-wrap:wrap;gap:8px;width:100%;margin-top:8px;padding-top:8px;border-top:1px solid var(--line);">
        <button class="btn small ${globalLocked?'danger-btn':'gold'}" id="toggleLockAllBtn">
          ${globalLocked?'🔓 فتح التوقعات':'🔒 قفل التوقعات للكل'}
        </button>
        <button class="btn ghost small" id="adminManageDoubleBtn">⚡ إدارة Double</button>
      </div>`;
    wrap.appendChild(bar);
  }
  if(globalLocked&&!isAdmin){
    const banner=document.createElement("div");banner.className="global-lock-banner";
    banner.innerHTML=`<span>🔒</span> التوقعات متقفلة دلوقتي — مش ممكن تعمل أو تعدل توقع`;
    wrap.appendChild(banner);
  }
  list.forEach((m,idx)=>{
    const card=buildMatchCard(m);
    card.classList.add("card-enter");card.style.animationDelay=`${idx*.07}s`;
    wrap.appendChild(card);
  });
  mainArea.innerHTML="";mainArea.appendChild(wrap);
  if(isAdmin){
    document.getElementById("exitAdminBtn").onclick=()=>{isAdmin=false;renderMain();};

      globalLocked=!globalLocked;

    };

  }
}

function buildMatchCard(m){
  const card=document.createElement("div");card.className="match-card";
  const pred=myPredictions[m.id]||{scoreA:"",scoreB:"",locked:false,isDouble:false};
  const isLocked=!!pred.locked,isDouble=!!pred.isDouble;
  const hasResult=m.resultA!=null&&m.resultB!=null;
  let pts=hasResult?calcPoints(pred.scoreA===""?null:Number(pred.scoreA),pred.scoreB===""?null:Number(pred.scoreB),m.resultA,m.resultB):null;
  const displayPts=(pts!==null&&isDouble)?pts*2:pts;
  const matchLocked=!!m.matchLocked;
  const metaRight=hasResult
    ?(displayPts===null?`<span class="pts">لسه ماتوقعتش</span>`
      :displayPts===6?`<span class="pts p3">+6 ⚡🎯 Double مضبوط!</span>`
      :displayPts===3?(isDouble?`<span class="pts p3">+3 ⚡✅ Double فائز</span>`:`<span class="pts p3">+3 🎯 نتيجة مضبوطة</span>`)
      :displayPts===2?`<span class="pts p1">+2 ⚡✅ Double فائز</span>`
      :displayPts===1?`<span class="pts p1">+1 ✅ فائز صحيح</span>`
      :`<span class="pts p0">0 ❌</span>`)
    :`<span style="color:var(--muted);font-size:11px;">${matchLocked?'🔒 مقفولة':'مفتوحة للتوقع'}</span>`;
  const round=m.round;
  const doubleUsedInRound=doubleUsed[round];
  const doubleLockedHere=doubleUsedInRound===m.id+"__locked";
  const doubleLockedElsewhere=doubleUsedInRound&&!doubleLockedHere;
  const effectiveLocked=isLocked||globalLocked||matchLocked;
  let doubleSectionHtml="";
  if(!hasResult){
    if(isDouble||doubleLockedHere){
      doubleSectionHtml=`
        <div class="double-section is-active">
          <div class="double-section-icon">⚡</div>
          <div class="double-section-label">DOUBLE مفعّل<small>النقاط مضاعفة على المباراة دي</small></div>
          <span class="double-locked-badge">🔒 مقفول</span>
        </div>`;
    }else if(!effectiveLocked){
      doubleSectionHtml=`
        <div class="double-section">
          <div class="double-section-icon" style="opacity:${doubleLockedElsewhere?.3:.85}">⚡</div>
          <div class="double-section-label">DOUBLE<small>${doubleLockedElsewhere?'اتستخدم في مباراة تانية في الراوند ده':'ضاعف نقاطك لو توقعك صح — مرة واحدة بس في الراوند'}</small></div>
          <button class="btn double-btn" ${doubleLockedElsewhere?'disabled':''} data-double="${m.id}">
            <span>⚡</span>${doubleLockedElsewhere?'مستخدم':'اختار'}
          </button>
        </div>`;
    }
  }
  if(isDouble||doubleLockedHere)card.classList.add("double-locked");
  if(matchLocked)card.classList.add("match-locked");
  const lockBadge=(isLocked||matchLocked)?`<span class="lock-badge">${matchLocked?'🔒 المباراة مقفولة':'🔒 مقفول'}</span>`:``;
  card.innerHTML=`
    <div class="match-meta">
      <div class="match-info-left">

      </div>

    </div>
    <div class="teams-row">
      <div class="team">
        ${flagHtml(m.teamA, m.id, "A")}
        <span class="team-name" ${isAdmin?'contenteditable="true"':''} data-side="A" data-id="${m.id}">${m.teamA}</span>
        <input type="number" min="0" max="30" class="score-box" data-id="${m.id}" data-side="A" value="${pred.scoreA}" placeholder="-" ${effectiveLocked?'disabled':''}/>

      <div class="team">
        ${flagHtml(m.teamB, m.id, "B")}
        <span class="team-name" ${isAdmin?'contenteditable="true"':''} data-side="B" data-id="${m.id}">${m.teamB}</span>
        <input type="number" min="0" max="30" class="score-box" data-id="${m.id}" data-side="B" value="${pred.scoreB}" placeholder="-" ${effectiveLocked?'disabled':''}/>

    ${doubleSectionHtml}
    ${isAdmin?`
      <div class="actual-row">
        <span class="lbl scoreboard-font">النتيجة الحقيقية</span>
        <input type="number" min="0" max="30" class="admin-score" data-result-id="${m.id}" data-side="A" value="${hasResult?m.resultA:''}"/>
        <span class="lbl">-</span>
        <input type="number" min="0" max="30" class="admin-score" data-result-id="${m.id}" data-side="B" value="${hasResult?m.resultB:''}"/>
        <button class="btn gold small" data-save-result="${m.id}">حفظ النتيجة</button>
        <button class="btn small ${matchLocked?'danger-btn':''}" data-toggle-match-lock="${m.id}" style="margin-right:4px">
          ${matchLocked?'🔓 فتح المباراة':'🔒 قفل المباراة'}
        </button>
      </div>
    `:hasResult?`
      <div class="actual-row">
        <span class="lbl scoreboard-font">النتيجة الحقيقية</span>
        <span class="score">${m.resultA} — ${m.resultB}</span>
      </div>
    `:''}
    <div class="card-footer">
      ${!effectiveLocked&&!hasResult?`<button class="btn small" data-save-pred="${m.id}">حفظ وقفل توقعي 🔒</button>`:lockBadge}
      <span class="saved-tag" id="saved_${m.id}"></span>
    </div>`;
  card.querySelectorAll('[data-save-pred]').forEach(btn=>{btn.onclick=()=>savePrediction(m.id);});
  const dblBtn=card.querySelector('[data-double]');
  if(dblBtn)dblBtn.onclick=()=>confirmDouble(m.id,round,m);
  if(isAdmin){
    card.querySelectorAll('[data-save-result]').forEach(btn=>{btn.onclick=()=>saveResult(m.id);});
    card.querySelectorAll('[data-toggle-match-lock]').forEach(btn=>{btn.onclick=()=>toggleMatchLock(m.id,matchLocked);});
    card.querySelectorAll('.team-name[contenteditable="true"]').forEach(el=>{
      el.onblur=()=>saveTeamName(m.id,el.dataset.side,el.textContent.trim());
    });
  }
  return card;
}

const confirmModal=document.getElementById("confirmModal");
const confirmModalBody=document.getElementById("confirmModalBody");
const confirmCancel=document.getElementById("confirmCancel");
const confirmOk=document.getElementById("confirmOk");

confirmCancel.onclick=()=>{
  confirmModal.classList.remove("open");pendingConfirm=null;
  confirmOk.textContent="تأكيد وقفل";confirmOk.style.display="";
  confirmCancel.textContent="إلغاء";delete confirmModal.dataset.mode;
};
confirmOk.onclick=()=>{
  const mode=confirmModal.dataset.mode;
  confirmModal.classList.remove("open");
  confirmOk.textContent="تأكيد وقفل";confirmOk.style.display="";confirmCancel.textContent="إلغاء";
  if(mode==="double"){
    doubleUsed[confirmModal.dataset.round]=confirmModal.dataset.matchId+"__locked";
    delete confirmModal.dataset.mode;renderMain();
  }else{
    if(pendingConfirm)doSavePrediction(pendingConfirm);
    pendingConfirm=null;delete confirmModal.dataset.mode;
  }
};

function savePrediction(matchId){
  if(!ensureUser())return;
  const m=matches[matchId];if(!m)return;
  if(globalLocked){alert("التوقعات متقفلة دلوقتي. 🔒");return;}
  const pred=myPredictions[matchId];
  if(pred&&pred.locked){alert("التوقع ده مقفول. 🔒");return;}
  const sAEl=document.querySelector(`.score-box[data-id="${matchId}"][data-side="A"]`);
  const sBEl=document.querySelector(`.score-box[data-id="${matchId}"][data-side="B"]`);
  const scoreA=sAEl.value,scoreB=sBEl.value;
  if(scoreA===""||scoreB===""){alert("اكتب نتيجة للفريقين الاتنين قبل الحفظ.");return;}
  const isDoubleOnThis=doubleUsed[m.round]===matchId+"__locked";
  const dblNote=isDoubleOnThis?`<span class="double-note">⚡ Double مفعّل — النقاط هتتضاعف لو صح!</span>`:"";
  const _cA=matchFlagOverrides[m.id]?.flagA||getFlagCode(m.teamA),_cB=matchFlagOverrides[m.id]?.flagB||getFlagCode(m.teamB);
  const fA=_cA?`<img src="${getFlagUrl(_cA)}" style="width:24px;height:16px;object-fit:cover;border-radius:2px;vertical-align:middle;">`:'🏳️';
  const fB=_cB?`<img src="${getFlagUrl(_cB)}" style="width:24px;height:16px;object-fit:cover;border-radius:2px;vertical-align:middle;">`:'🏳️';
  document.querySelector(".modal-icon").textContent="🔒";
  document.querySelector(".modal-title").textContent="تأكيد التوقع";
  confirmOk.textContent="تأكيد وقفل";
  confirmModalBody.innerHTML=`
    <span style="font-size:18px">${fA} ${m.teamA} <b>vs</b> ${m.teamB} ${fB}</span>
    <span class="highlight">${scoreA} — ${scoreB}</span>
    لو حفظت، التوقع ده هيتقفل ومش هتقدر تغيره.${dblNote}`;
  confirmModal.dataset.mode="prediction";
  pendingConfirm={matchId,scoreA,scoreB,isDouble:isDoubleOnThis,round:m.round};
  confirmModal.classList.add("open");
}

function doSavePrediction({matchId,scoreA,scoreB,isDouble,round}){
  const docId=`${matchId}__${userId}`;
  const data={matchId,uid:userId,userName,scoreA:Number(scoreA),scoreB:Number(scoreB),locked:true,isDouble:!!isDouble,updatedAt:Date.now()};
  myPredictions[matchId]={scoreA,scoreB,locked:true,isDouble:!!isDouble};
  if(db){
    db.collection("predictions").doc(docId).set(data).then(()=>{flashSaved(matchId);renderMain();})
      .catch(err=>{console.error(err);alert("حصل خطأ في الحفظ.");});
  }else{flashSaved(matchId);renderMain();}
}

function flashSaved(matchId){
  const tag=document.getElementById(`saved_${matchId}`);
  if(tag){tag.textContent="تم الحفظ ✅";setTimeout(()=>{if(tag)tag.textContent="";},2500);}
}

function confirmDouble(matchId,round,m){
  if(!ensureUser())return;
  const _cA=matchFlagOverrides[m.id]?.flagA||getFlagCode(m.teamA),_cB=matchFlagOverrides[m.id]?.flagB||getFlagCode(m.teamB);
  const fA=_cA?`<img src="${getFlagUrl(_cA)}" style="width:24px;height:16px;object-fit:cover;border-radius:2px;vertical-align:middle;">`:'🏳️';
  const fB=_cB?`<img src="${getFlagUrl(_cB)}" style="width:24px;height:16px;object-fit:cover;border-radius:2px;vertical-align:middle;">`:'🏳️';
  confirmModal.dataset.mode="double";confirmModal.dataset.matchId=matchId;confirmModal.dataset.round=round;
  document.querySelector(".modal-icon").textContent="⚡";
  document.querySelector(".modal-title").textContent="تأكيد الـ Double";
  confirmModalBody.innerHTML=`
    <span style="font-size:18px">${fA} ${m.teamA} <b>vs</b> ${m.teamB} ${fB}</span>
    <span class="highlight" style="font-size:16px;color:var(--gold)">⚡ نقاطك على المباراة دي هتتضاعف</span>
    لو أكدت، الـ Double هيتقفل ومش هتقدر تغييره أو تستخدمه في مباراة تانية في نفس الراوند.
    <span class="double-note">⚡ مرة واحدة بس في كل راوند — اختار بعقلك!</span>`;
  confirmOk.textContent="تأكيد وقفل الـ Double ⚡";
  confirmModal.classList.add("open");
}

function saveResult(matchId){
  const aEl=document.querySelector(`.admin-score[data-result-id="${matchId}"][data-side="A"]`);
  const bEl=document.querySelector(`.admin-score[data-result-id="${matchId}"][data-side="B"]`);
  if(aEl.value===""||bEl.value===""){alert("اكتب النتيجة كاملة قبل الحفظ.");return;}
  const rA=Number(aEl.value),rB=Number(bEl.value);
  if(db){db.collection("matches").doc(matchId).set({resultA:rA,resultB:rB},{merge:true}).catch(err=>console.error(err));}
  else{matches[matchId].resultA=rA;matches[matchId].resultB=rB;renderMain();}
}

function toggleMatchLock(matchId, currentlyLocked){
  const newVal=!currentlyLocked;
  if(db){
    db.collection("matches").doc(matchId).set({matchLocked:newVal},{merge:true})
      .catch(err=>{console.error(err);alert("حصل خطأ.");});
  }else{
    matches[matchId].matchLocked=newVal;renderMain();
  }
}

function saveTeamName(matchId,side,value){
  if(!value)return;
  const field=side==="A"?"teamA":"teamB";
  if(db){db.collection("matches").doc(matchId).set({[field]:value},{merge:true}).catch(err=>console.error(err));}
  else{matches[matchId][field]=value;}
}

function renderLeaderboard(){
  const totals={};
  Object.entries(allUsers).forEach(([uid,u])=>{totals[uid]={name:u.name||"لاعب",pts:0,exact:0,winner:0,played:0};});
  allPredictions.forEach(p=>{
    const m=matches[p.matchId];if(!m)return;
    const uid=p.uid||p.userName;
    if(!totals[uid])totals[uid]={name:p.userName||"لاعب",pts:0,exact:0,winner:0,played:0};
    if(m.resultA==null||m.resultB==null)return;
    let pts=calcPoints(p.scoreA,p.scoreB,m.resultA,m.resultB);if(pts===null)return;
    if(p.isDouble)pts*=2;
    totals[uid].pts+=pts;totals[uid].played+=1;
    if(pts>=3)totals[uid].exact+=1;
    else if(pts>=1)totals[uid].winner+=1;
  });
  const rows=Object.entries(totals).map(([uid,t])=>({uid,...t})).sort((a,b)=>b.pts-a.pts);
  const wrap=document.createElement("div");
  if(!rows.length){
    wrap.innerHTML=`<div class="empty"><span class="empty-icon">🏆</span>مفيش لاعبين مسجلين لسه.</div>`;
    mainArea.innerHTML="";mainArea.appendChild(wrap);return;
  }
  const medal=i=>i===0?"🥇":i===1?"🥈":i===2?"🥉":(i+1);
  const rc=i=>i===0?"rank gold-1":i===1?"rank silver-2":i===2?"rank bronze-3":"rank";
  wrap.innerHTML=`
    <div class="leaderboard">
      <table>
        <thead><tr><th>#</th><th>اللاعب</th><th>🎯 مضبوطة</th><th>✅ فائز</th><th>مباريات</th><th>النقاط</th></tr></thead>
        <tbody>
          ${rows.map((r,i)=>`
            <tr class="${r.uid===userId?'you-row':''}">
              <td class="${rc(i)}">${medal(i)}</td>
              <td><div class="player-name-cell">${r.name}${r.uid===userId?` <span style="color:var(--mint);font-size:11px;">(انت)</span>`:''}</div></td>
              <td>${r.exact}</td><td>${r.winner}</td>
              <td style="color:var(--muted)">${r.played}</td>
              <td class="total-pts">${r.pts}</td>
            </tr>`).join("")}
        </tbody>
      </table>
    </div>`;
  mainArea.innerHTML="";mainArea.appendChild(wrap);
}

function openManageDoublePanel(){
  const ud={};
  allPredictions.forEach(p=>{
    if(p.isDouble){const m=matches[p.matchId];if(!m)return;
      const uid=p.uid||p.userName,name=p.userName||uid;
      if(!ud[uid])ud[uid]={name,doubles:[]};
      ud[uid].doubles.push({matchId:p.matchId,round:m.round,teamA:m.teamA,teamB:m.teamB});}
  });
  const entries=Object.entries(ud);
  document.querySelector(".modal-icon").textContent="⚡";
  document.querySelector(".modal-title").textContent="إدارة الـ Double";
  confirmOk.style.display="none";confirmCancel.textContent="إغلاق";
  confirmModalBody.innerHTML=!entries.length
    ?`<div style="color:var(--muted);padding:10px 0;">مفيش حد استخدم الـ Double لحد دلوقتي.</div>`
    :`<div style="text-align:right;width:100%;">
        ${entries.map(([uid,u])=>`
          <div style="background:var(--bg-deep);border:1px solid var(--line);border-radius:10px;padding:12px;margin-bottom:10px;">
            <div style="font-family:'Oswald',sans-serif;color:var(--cream);font-size:14px;margin-bottom:8px;">👤 ${u.name}</div>
            ${u.doubles.map(d=>{
              const _cA=matchFlagOverrides[d.matchId]?.flagA||getFlagCode(d.teamA);
              const _cB=matchFlagOverrides[d.matchId]?.flagB||getFlagCode(d.teamB);
              const fA=_cA?`<img src="${getFlagUrl(_cA)}" style="width:22px;height:14px;object-fit:cover;border-radius:2px;vertical-align:middle;">`:'🏳️';
              const fB=_cB?`<img src="${getFlagUrl(_cB)}" style="width:22px;height:14px;object-fit:cover;border-radius:2px;vertical-align:middle;">`:'🏳️';
              return `<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap;">
                <span style="font-size:12px;color:var(--gold);flex:1;">⚡ ${fA}${d.teamA} vs ${d.teamB}${fB} <span style="color:var(--muted)">(${d.round})</span></span>
                <button class="btn small danger-btn" onclick="adminRemoveDouble('${uid}','${d.matchId}')">إلغاء Double</button>
              </div>`;}).join("")}
          </div>`).join("")}
      </div>`;
  confirmModal.dataset.mode="manage";confirmModal.classList.add("open");
}

function adminRemoveDouble(uid,matchId){
  if(!db){alert("Firebase غير متصل.");return;}
  db.collection("predictions").doc(`${matchId}__${uid}`).set({isDouble:false},{merge:true})
    .then(()=>{
      if(uid===userId){const m=matches[matchId];if(m)delete doubleUsed[m.round];}
      const idx=allPredictions.findIndex(p=>p.uid===uid&&p.matchId===matchId);
      if(idx!==-1)allPredictions[idx].isDouble=false;
      openManageDoublePanel();
    }).catch(err=>{console.error(err);alert("حصل خطأ.");});
}

function seedMatchesIfEmpty(){
  if(!db)return;
  db.collection("matches").limit(1).get().then(snap=>{
    if(snap.empty){
      const batch=db.batch();
      SEED_MATCHES.forEach(m=>{const ref=db.collection("matches").doc(m.id);batch.set(ref,m);});
      batch.commit().catch(err=>console.error("seed error",err));
    }
  });
}

function listenMatches(){
  if(!db){SEED_MATCHES.forEach(m=>matches[m.id]=m);setConn("وضع محلي",false);renderMain();return;}
  db.collection("matches").onSnapshot(snap=>{
    snap.forEach(doc=>{matches[doc.id]=doc.data();});setConn("متصل ومتزامن مع صحابك",true);renderMain();
  },err=>{console.error(err);setConn("خطأ في الاتصال بـ Firebase",false);});
}

function listenAllPredictions(){
  if(!db)return;
  db.collection("predictions").onSnapshot(snap=>{
    allPredictions=snap.docs.map(d=>d.data());if(activeTab==="الترتيب")renderMain();
  });
}

function loadMyPredictions(){
  if(!db||!userId)return;
  db.collection("predictions").where("uid","==",userId).get().then(snap=>{
    myPredictions={};doubleUsed={};
    snap.forEach(doc=>{
      const d=doc.data();
      myPredictions[d.matchId]={scoreA:String(d.scoreA),scoreB:String(d.scoreB),locked:!!d.locked,isDouble:!!d.isDouble};
      if(d.isDouble){const m=matches[d.matchId];if(m)doubleUsed[m.round]=d.matchId+"__locked";}
    });
    renderMain();
  });
}

function listenUsers(){
  if(!db)return;
  db.collection("users").onSnapshot(snap=>{
    allUsers={};snap.forEach(doc=>{allUsers[doc.id]=doc.data();});
    if(activeTab==="الترتيب")renderMain();
  });
}

function listenSettings(onReady){
  if(!db){onReady&&onReady();return;}
  let firstRead=true;
  db.collection("settings").doc("global").onSnapshot(doc=>{
    const prev=globalLocked;
    globalLocked=doc.exists?!!doc.data().predictionsLocked:false;
    if(firstRead){firstRead=false;onReady&&onReady();}
    else if(prev!==globalLocked){renderMain();}
  },err=>{console.error("settings listener error",err);onReady&&onReady();});
}

function ensureUser(){if(!userId){alert("لازم تسجّل دخول الأول من فوق.");return false;}return true;}

function renderMain(){
  if(activeTab==="الترتيب")renderLeaderboard();
  else renderMatchesForRound(activeTab);
}

let _activePicker=null;

function openFlagPicker(e, matchId, side){
  e.stopPropagation();
  // close any open picker first
  if(_activePicker)_activePicker.classList.remove("open");

  const btn=e.currentTarget;
  let dd=btn.parentElement.querySelector('.flag-dropdown');
  if(!dd){
    dd=document.createElement('div');
    dd.className='flag-dropdown';
    dd.innerHTML=`<input class="flag-search" placeholder="ابحث عن دولة…" oninput="filterFlagOptions(this)">
      <div class="flag-option no-flag" data-code="" onclick="saveFlagChoice('${matchId}','${side}','',this)">❌ بلا علم</div>
      ${ALL_COUNTRIES.map(([name,code])=>`
        <div class="flag-option" data-code="${code}" onclick="saveFlagChoice('${matchId}','${side}','${code}',this)">
          <img src="${getFlagUrl(code)}" loading="lazy" onerror="this.style.visibility='hidden'">
          ${name}
        </div>`).join('')}`;
    btn.parentElement.appendChild(dd);
  }
  dd.classList.toggle('open');
  _activePicker=dd.classList.contains('open')?dd:null;
  // close on outside click
  if(_activePicker){
    setTimeout(()=>document.addEventListener('click',closeFlagPicker,{once:true}),0);
    const inp=dd.querySelector('.flag-search');if(inp)inp.focus();
  }
}

function closeFlagPicker(){if(_activePicker){_activePicker.classList.remove('open');_activePicker=null;}}

function filterFlagOptions(inp){
  const q=inp.value.trim();
  inp.parentElement.querySelectorAll('.flag-option:not(.no-flag)').forEach(el=>{
    el.style.display=el.textContent.includes(q)?'':'none';
  });
}

function saveFlagChoice(matchId, side, code, optEl){
  if(!matchFlagOverrides[matchId])matchFlagOverrides[matchId]={};
  const field=side==="A"?"flagA":"flagB";
  matchFlagOverrides[matchId][field]=code||null;
  closeFlagPicker();
  // save to Firestore
  if(db){
    db.collection("matchFlags").doc(matchId).set({[field]:code||null},{merge:true})
      .catch(err=>console.error("flag save error",err));
  }
  renderMain();
}

function listenMatchFlags(){
  if(!db)return;
  db.collection("matchFlags").onSnapshot(snap=>{
    snap.forEach(doc=>{matchFlagOverrides[doc.id]=doc.data();});
    renderMain();
  },err=>console.error("matchFlags listener",err));
}

/* Boot */
setAuthMode("login");renderTabs();seedMatchesIfEmpty();
listenSettings(()=>{
  listenMatches();listenAllPredictions();listenUsers();listenMatchFlags();
  const savedUid=localStorage.getItem("wc2026_uid");
  const savedName=localStorage.getItem("wc2026_name");
  if(savedUid&&savedName&&db){
    db.collection("accounts").doc(savedUid).get()
      .then(doc=>{
        if(doc.exists){onLoggedIn(savedUid,savedName);}
        else{localStorage.removeItem("wc2026_uid");localStorage.removeItem("wc2026_name");}
      }).catch(()=>{onLoggedIn(savedUid,savedName);});
  }
});
</script>
